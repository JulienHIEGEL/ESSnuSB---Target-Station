######################## Collimator ########################
######################## UNIT: [cm] ########################

Collimator:
    DRAW : True
    # x,y,z is the global volume but also the total volume occupied by the CLMT
    x   : [-250, 250]
    y   : [-250, 250]
    z   : [300, 450]
    R   : 30
    R_w : 50 # width of tungten ring (W ring) is R_w - R

###################### end Collimator ######################
