######################## Quadrupole ########################
######################## UNIT: [cm] ########################

Quad:
    DRAW : True
    
    volw : 80.2 # Global Volume width (z direction)
    volR : 84.1 # Global Volum radius
    # Iron
    few  : 80
    feR  : 84
    # Vaccum
    vacw : 80
    vacR : 44

    zPark: -2000 # Where to place it in the Parking
    xPark: 0
    yPark: 0

    N    : 7  # Number of quad in the transfert line
    zquad1: 0 # where the first quad is located inside the t2r (z axis of the t2r)

