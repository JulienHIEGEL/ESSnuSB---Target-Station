############################################################
###################### BeamDump & t2r ######################
######################## UNIT: [cm] ########################

# BeamDump and t2r are defined together because the t2r 
# is defined such that it doesn't touch the BeamDump. 

BeamDump:
    DRAW : True
    x    : [-250, 250]
    y    : [-250, 250]
    z0   : 1170
    width: 300
    
t2r:
    DRAW : True
    width   : 200  # x, y extents = +/- width/2 
    length  : 1000 # start from 0 before transformation
    theta   : -29.5 # angle of deviation
    w_walls : 500
    w_vessel: 10

    z_start : 800     # Where we want bottom left after transformation
    x_start : -250    # Where we want bottom left after transformation
    
#################### end BeamDump & t2r ####################
